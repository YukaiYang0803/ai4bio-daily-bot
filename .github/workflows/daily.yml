name: AI4Bio Daily Paper Digest

on:
  schedule:
    # Every day at 12:47 Beijing time = 04:47 UTC
    # This is after arXiv's normal nightly metadata release window in both US DST and non-DST periods.
    - cron: '47 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -u main.py

      - name: Commit state and logs
        if: always()
        run: |
          git config user.name "AI4Bio Bot"
          git config user.email "bot@ai4bio.local"
          git add data/ logs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "[bot] update state and logs for $(date +%Y-%m-%d)"
            git push
          fi